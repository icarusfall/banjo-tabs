<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Banjo Tabs · Sign up</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body class="auth-page">
  <main class="auth-card">
    <h1>Banjo Tabs</h1>
    <p class="muted">Create your account. Tabs autosave to your library.</p>

    <form id="signup-form" class="auth-form">
      <label>Email <input type="email" name="email" autocomplete="email" required autofocus /></label>
      <label>Username
        <input type="text" name="username" pattern="[a-z0-9][a-z0-9_-]{1,30}" autocomplete="username" required />
        <small class="hint">Used in shareable URLs (lowercase, 2–31 chars).</small>
      </label>
      <label>Password
        <input type="password" name="password" autocomplete="new-password" minlength="8" required />
        <small class="hint">At least 8 characters.</small>
      </label>
      <button type="submit" class="btn-primary">Create account</button>
      <p id="error" class="error" hidden></p>
    </form>

    <p class="auth-alt">
      Already have an account? <a href="/login">Log in</a>
    </p>
  </main>
  <script src="/auth.js" type="module"></script>
</body>
</html>
