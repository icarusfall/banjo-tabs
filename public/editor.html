<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Banjo Tabs · Editor</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body class="app-layout">
  <aside class="sidebar no-print">
    <div class="sidebar-header">
      <h1>Banjo Tabs</h1>
      <button id="btn-new" class="btn-primary">+ New</button>
    </div>
    <ul id="tab-list" class="tab-list"></ul>
    <div class="sidebar-footer">
      <a href="/browse" class="muted-link">Browse public tabs →</a>
      <div class="user-row">
        <span id="user-username" class="muted-link"></span>
        <button id="btn-logout" class="link-btn">Log out</button>
      </div>
    </div>
  </aside>

  <main class="editor">
    <header class="editor-header no-print">
      <div class="meta-fields">
        <input id="meta-title" placeholder="Title" />
        <input id="meta-artist" placeholder="Artist" />
      </div>
      <div class="meta-extras">
        <label>Tempo <input id="meta-tempo" type="number" min="20" max="300" step="1" /></label>
        <label>Time
          <select id="meta-timesig">
            <option value="4/4">4/4</option>
            <option value="3/4">3/4</option>
            <option value="2/4">2/4</option>
            <option value="6/8">6/8</option>
          </select>
        </label>
        <label>Subdiv
          <select id="meta-subdivision">
            <option value="2">8ths</option>
            <option value="4" selected>16ths</option>
            <option value="3">triplets</option>
          </select>
        </label>
        <label>Visibility
          <select id="meta-visibility">
            <option value="private">Private</option>
            <option value="unlisted">Unlisted (link)</option>
            <option value="public">Public</option>
          </select>
        </label>
      </div>
      <div class="actions">
        <span id="save-indicator" class="save-indicator">Saved</span>
        <button id="btn-share" class="btn-secondary" title="Copy share link">Share</button>
        <button id="btn-add-measure" class="btn-secondary">+ Measure</button>
        <button id="btn-print" class="btn-secondary">Print</button>
      </div>
    </header>

    <div class="hint-bar no-print">
      <span><kbd>Click</kbd> a cell, then <kbd>0</kbd>–<kbd>9</kbd> to set fret. Two digits within 500ms make 10–24.</span>
      <span><kbd>←</kbd>/<kbd>→</kbd>/<kbd>↑</kbd>/<kbd>↓</kbd> move · <kbd>Space</kbd> advance · <kbd>Backspace</kbd> erase · <kbd>Enter</kbd> next measure</span>
    </div>

    <div id="print-title" class="print-only"></div>
    <div id="staff-area" class="staff-area"></div>

    <section class="notes-section no-print">
      <label for="meta-notes">Notes</label>
      <textarea id="meta-notes" placeholder="Performance notes, timings, capo position..."></textarea>
    </section>
  </main>

  <script src="/editor.js" type="module"></script>
</body>
</html>
