<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Banjo Tabs · View</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body class="page">
  <header class="page-header no-print">
    <h1><a href="/">Banjo Tabs</a></h1>
    <nav id="page-nav"></nav>
  </header>
  <main class="page-main">
    <div class="view-meta">
      <h2 id="view-title">Loading…</h2>
      <p class="muted" id="view-sub"></p>
      <div id="view-actions" class="view-actions no-print"></div>
    </div>
    <div id="staff-area" class="staff-area"></div>
    <section class="notes-section view-notes no-print" id="view-notes-section" hidden>
      <h3>Notes</h3>
      <pre id="view-notes"></pre>
    </section>
  </main>
  <script src="/view.js" type="module"></script>
</body>
</html>
